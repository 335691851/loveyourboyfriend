services:
  - type: web
    name: loveyourboyfriend-api
    runtime: python
    plan: starter
    branch: master
    rootDir: apps/api
    buildCommand: uv sync --frozen --no-dev
    startCommand: uv run --no-sync uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: ALLOWED_ORIGINS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: CHAT_MODEL
        value: gpt-5.6-terra
      - key: VOICE_MODEL
        value: gpt-realtime-2.1-mini
      - key: SUPABASE_URL
        value: https://rycwnxynvlfqkfgsksrs.supabase.co
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: TURNSTILE_SECRET_KEY
        sync: false
      - key: DATA_RETENTION_DAYS
        value: "90"
